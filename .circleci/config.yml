# Every branch / PR: lint and Docker build run in parallel (no registry push).
# Node + pnpm: canonical pins are .tool-versions; keep node/default tag in sync; packageManager matches pnpm line for Corepack.
#
# docker-build uses the Docker executor + remote Docker (not `machine`) so it works on
# plans where machine `ubuntu-2204` + resource_class combinations are rejected.
version: 2.1

orbs:
  node: circleci/node@5.3.0

jobs:
  test:
    executor:
      name: node/default
      tag: '24.11.0'
    steps:
      - checkout
      # pnpm on CircleCI: https://pnpm.io/continuous-integration#circleci
      # circleci/node install-packages supports npm/yarn/yarn-berry only — use Corepack + pnpm explicitly.
      - restore_cache:
          name: Restore pnpm package cache
          keys:
            - pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-v1-
      - run:
          name: Install pnpm (Corepack reads package.json packageManager)
          command: |
            set -euo pipefail
            npm install --global corepack@latest
            corepack enable
            corepack install
      - run:
          name: Install dependencies
          # Match https://pnpm.io/continuous-integration#circleci (store cached at .pnpm-store)
          command: pnpm install --frozen-lockfile --store-dir .pnpm-store
      - save_cache:
          name: Save pnpm package cache
          key: pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store
      - run:
          name: Lint
          command: pnpm run lint

  docker-build:
    docker:
      - image: cimg/base:2026.03
    steps:
      - checkout
      # If the job fails with Docker client/daemon API mismatch, set `version` to a supported
      # remote Docker from https://circleci.com/docs/building-docker-images/#docker-version
      - setup_remote_docker:
          version: default
      - run:
          name: Build Docker image (CI verification only — no push)
          no_output_timeout: 25m
          command: |
            set -euo pipefail
            docker version
            # Plain progress so long `next build` steps don’t look hung; pin platform for consistent pulls.
            DOCKER_BUILDKIT=1 docker build \
              --progress=plain \
              --platform linux/amd64 \
              -t front-vincelivemix:ci \
              -f Dockerfile .
            echo "Docker image built successfully (not pushed)."

workflows:
  version: 2
  ci:
    jobs:
      - test
      - docker-build
