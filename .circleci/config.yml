# Every branch / PR: lint + verify the Dockerfile builds (no registry push).
# Node: canonical pin is .tool-versions (nodejs line); keep node/default tag in sync.
#
# docker-build uses the Docker executor + remote Docker (not `machine`) so it works on
# plans where machine `ubuntu-2204` + resource_class combinations are rejected.
version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  test:
    executor:
      name: node/default
      tag: '24.11.0'
    steps:
      - checkout
      - node/install-packages:
          cache-path: ~/project/node_modules
          override-ci-command: npm ci
      - run:
          name: Lint
          command: npm run lint

  docker-build:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - run:
          name: Build Docker image (CI verification only — no push)
          command: |
            set -euo pipefail
            docker build -t front-vincelivemix:ci -f Dockerfile .
            echo "Docker image built successfully (not pushed)."

workflows:
  version: 2
  ci:
    jobs:
      - test
      - docker-build:
          requires:
            - test
